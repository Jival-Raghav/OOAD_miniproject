spring:
  application:
    name: insightinvest-backend-java
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/insightinvest}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8000}

jwt:
  secret: ${JWT_SECRET:insightinvest_secret_key_for_jwt_token_generation_min_256_bits}
  expiration: ${JWT_EXPIRATION:3600000}

insight:
  external:
    yahoo-chart-url: https://query1.finance.yahoo.com/v8/finance/chart
    yahoo-summary-url: https://query2.finance.yahoo.com/v10/finance/quoteSummary
    google-news-rss-url: https://news.google.com/rss/search
  ai:
    groq-api-key: ${GROQ_API_KEY:}
    groq-model: ${GROQ_MODEL:llama-3.3-70b-versatile}

management:
  endpoints:
    web:
      exposure:
        include: health,info

